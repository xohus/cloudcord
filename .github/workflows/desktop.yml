name: CloudCord Desktop

on:
  workflow_dispatch:
  push:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"

jobs:
  windows:
    name: Build CloudCord Desktop Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          choco install mingw --no-progress -y
          $mingwPaths = @(
            "C:\ProgramData\mingw64\mingw64\bin",
            "C:\tools\mingw64\bin",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          )
          foreach ($p in $mingwPaths) {
            if (Test-Path $p) {
              Add-Content $env:GITHUB_PATH $p
            }
          }
          go version
          node --version
          pnpm --version

      - name: Install client dependencies
        working-directory: desktop/client
        shell: pwsh
        run: |
          pnpm install --no-frozen-lockfile

      - name: Build desktop runtime
        working-directory: desktop/client
        shell: pwsh
        run: |
          pnpm build
          if (-not (Test-Path "dist/desktop")) {
            throw "desktop/client/dist/desktop was not produced"
          }

      - name: Build CloudCord Setup
        working-directory: desktop/client/installer
        shell: pwsh
        run: |
          go build -o CloudCordSetup.exe .
          if (-not (Test-Path "CloudCordSetup.exe")) {
            throw "CloudCordSetup.exe was not produced"
          }

      - name: Stage desktop artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path desktop/client/dist | Out-Null

          if (-not (Test-Path "desktop/client/installer/CloudCordSetup.exe")) {
            throw "CloudCordSetup.exe missing from installer folder"
          }

          if (-not (Test-Path "desktop/client/dist/desktop")) {
            throw "desktop/client/dist/desktop missing"
          }

          Copy-Item "desktop/client/installer/CloudCordSetup.exe" "desktop/client/dist/CloudCordSetup.exe" -Force

          if (-not (Test-Path "desktop/client/CREDITS.md")) {
            "CloudCord Desktop`nBased on Sincord/Vencord-style architecture.`n" | Out-File -Encoding utf8 "desktop/client/CREDITS.md"
          }

          if (-not (Test-Path "desktop/client/CLOUDCORD_NOTES.md")) {
            "CloudCord Desktop build artifact.`n" | Out-File -Encoding utf8 "desktop/client/CLOUDCORD_NOTES.md"
          }

          if (-not (Test-Path "desktop/client/dist/CloudCordSetup.exe")) {
            throw "Final CloudCordSetup.exe missing"
          }

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudCordDesktop-Windows
          path: |
            desktop/client/dist/CloudCordSetup.exe
            desktop/client/dist/desktop/**
            desktop/client/CREDITS.md
            desktop/client/CLOUDCORD_NOTES.md
            desktop/README.md
