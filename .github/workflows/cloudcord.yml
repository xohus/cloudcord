name: Build CloudCord Runtime

"on":
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Clone Kettu source
        run: |
          set -e
          rm -rf _kettu_build
          git clone --depth=1 https://codeberg.org/cocobo1/Kettu.git _kettu_build

      - name: Apply CloudCord branding and Cloud Sync tab
        run: |
          set -e
          cd _kettu_build

          if [ -f "../cloudcord-favicon.png" ]; then
            cp "../cloudcord-favicon.png" "src/assets/icons/kettu.png"
          elif [ -f "../assets/cloudcord-favicon.png" ]; then
            cp "../assets/cloudcord-favicon.png" "src/assets/icons/kettu.png"
          elif [ -f "../assets/cloudcord-logo.png" ]; then
            cp "../assets/cloudcord-logo.png" "src/assets/icons/kettu.png"
          fi

          mkdir -p src/core/ui/settings/pages/CloudSync

          cat > src/core/ui/settings/pages/CloudSync/index.tsx <<'TSX'
          import { VdPluginManager } from "@core/vendetta/plugins";
          import { useProxy } from "@core/vendetta/storage";
          import { findAssetId } from "@lib/api/assets";
          import { showToast } from "@lib/ui/toasts";
          import { Button, Card, Stack, TableRow, TableRowGroup, Text } from "@metro/common/components";
          import { useState } from "react";
          import { ScrollView, View } from "react-native";

          const PLUGIN_URL = "https://revenge.nexpid.xyz/cloud-sync/";
          const CLOUDSYNC_ICON = "https://github.com/nexpid/CloudSync/raw/main/assets/icon-bright.svg";

          export default function CloudSync() {
              useProxy(VdPluginManager.plugins);

              const [busy, setBusy] = useState(false);
              const [refresh, setRefresh] = useState(0);

              const plugin = VdPluginManager.plugins[PLUGIN_URL];
              const SettingsComponent = plugin?.enabled ? VdPluginManager.getSettings(PLUGIN_URL) : null;

              async function installOrStart() {
                  if (busy) return;

                  setBusy(true);

                  try {
                      if (!VdPluginManager.plugins[PLUGIN_URL]) {
                          await VdPluginManager.installPlugin(PLUGIN_URL, true);
                          showToast("Cloud Sync installed", findAssetId("Check"));
                      } else if (!VdPluginManager.plugins[PLUGIN_URL].enabled) {
                          await VdPluginManager.startPlugin(PLUGIN_URL);
                          showToast("Cloud Sync started", findAssetId("Check"));
                      } else {
                          showToast("Cloud Sync is already enabled", findAssetId("Check"));
                      }

                      setRefresh(x => x + 1);
                  } catch (error: any) {
                      console.error("[CloudCord] Cloud Sync install/start failed", error);
                      showToast(error?.message ?? "Cloud Sync failed");
                  } finally {
                      setBusy(false);
                  }
              }

              async function refetchPlugin() {
                  if (busy) return;

                  setBusy(true);

                  try {
                      if (VdPluginManager.plugins[PLUGIN_URL]?.enabled) {
                          VdPluginManager.stopPlugin(PLUGIN_URL, false);
                      }

                      await VdPluginManager.fetchPlugin(PLUGIN_URL);
                      await VdPluginManager.startPlugin(PLUGIN_URL);

                      showToast("Cloud Sync refreshed", findAssetId("Check"));
                      setRefresh(x => x + 1);
                  } catch (error: any) {
                      console.error("[CloudCord] Cloud Sync refresh failed", error);
                      showToast(error?.message ?? "Cloud Sync refresh failed");
                  } finally {
                      setBusy(false);
                  }
              }

              async function removePlugin() {
                  if (busy) return;

                  setBusy(true);

                  try {
                      if (VdPluginManager.plugins[PLUGIN_URL]) {
                          await VdPluginManager.removePlugin(PLUGIN_URL);
                      }

                      showToast("Cloud Sync removed");
                      setRefresh(x => x + 1);
                  } catch (error: any) {
                      console.error("[CloudCord] Cloud Sync remove failed", error);
                      showToast(error?.message ?? "Cloud Sync remove failed");
                  } finally {
                      setBusy(false);
                  }
              }

              if (SettingsComponent) {
                  return <SettingsComponent key={`cloud-sync-settings-${refresh}`} />;
              }

              return (
                  <ScrollView style={{ flex: 1 }} contentContainerStyle={{ paddingBottom: 38 }}>
                      <Stack style={{ paddingVertical: 24, paddingHorizontal: 12 }} spacing={24}>
                          <TableRowGroup title="Cloud Sync">
                              <View style={{ paddingHorizontal: 12, paddingBottom: 12 }}>
                                  <Text variant="heading-md/semibold" color="text-normal">
                                      Cloud Sync
                                  </Text>
                                  <Text variant="text-sm/medium" color="text-muted">
                                      Install the official Cloud Sync plugin to connect, sync, add backup files, and save backups to your device.
                                  </Text>
                              </View>

                              <TableRow
                                  arrow
                                  label={plugin ? "Start Cloud Sync" : "Install Cloud Sync"}
                                  subLabel={busy ? "Please wait..." : "Loads the official Cloud Sync plugin UI"}
                                  icon={<TableRow.Icon source={{ uri: CLOUDSYNC_ICON }} />}
                                  onPress={installOrStart}
                              />

                              {plugin && (
                                  <TableRow
                                      arrow
                                      label="Refresh Cloud Sync"
                                      subLabel="Refetches the official plugin"
                                      icon={<TableRow.Icon source={findAssetId("RetryIcon")!} />}
                                      onPress={refetchPlugin}
                                  />
                              )}

                              {plugin && (
                                  <TableRow
                                      arrow
                                      label="Remove Cloud Sync"
                                      subLabel="Uninstalls the Cloud Sync plugin"
                                      icon={<TableRow.Icon source={findAssetId("TrashIcon") ?? findAssetId("CircleXIcon-primary")!} />}
                                      onPress={removePlugin}
                                  />
                              )}
                          </TableRowGroup>

                          <Card border="strong">
                              <View style={{ padding: 12 }}>
                                  <Text variant="text-sm/medium" color="text-muted">
                                      This tab uses the official Cloud Sync plugin. The plugin itself handles OAuth, sync, backups, and files.
                                  </Text>
                              </View>
                          </Card>
                      </Stack>
                  </ScrollView>
              );
          }
          TSX

          python3 - <<'PY'
          from pathlib import Path
          import re

          DISCORD_URL = "https://discord.gg/5naTPJYemX"
          GITHUB_URL = "https://github.com/xohus/cloudcord"
          CLOUDCORD_ICON = "https://raw.githubusercontent.com/xohus/cloudcord/main/cloudcord-favicon.png"
          CLOUDSYNC_ICON = "https://github.com/nexpid/CloudSync/raw/main/assets/icon-bright.svg"

          replacements = {
              "KettuTweak": "CloudCord",
              "Kettu Enhancements": "CloudCord Enhancements",
              "Kettu": "CloudCord",
              "https://github.com/C0C0B01/CloudCord": GITHUB_URL,
              "https://github.com/C0C0B01/Kettu": GITHUB_URL,
              "https://github.com/BypassHub-EX/cloudcord": GITHUB_URL,
              "https://codeberg.org/cocobo1/CloudCord": GITHUB_URL,
              "https://codeberg.org/cocobo1/Kettu": GITHUB_URL,
              "Load Kettu without loading add-ons": "Load CloudCord without loading add-ons",
              "Failed to load Kettu!": "Failed to load CloudCord!"
          }

          exts = {".ts", ".tsx", ".js", ".jsx", ".json", ".mjs", ".md"}

          for path in Path(".").rglob("*"):
              if not path.is_file() or path.suffix not in exts:
                  continue

              text = path.read_text(encoding="utf-8", errors="ignore")
              original = text

              for old, new in replacements.items():
                  text = text.replace(old, new)

              if text != original:
                  path.write_text(text, encoding="utf-8")

          constants = Path("src/lib/utils/constants.ts")
          if constants.exists():
              text = constants.read_text(encoding="utf-8", errors="ignore")

              text = re.sub(
                  r'export const DISCORD_SERVER = ".*?";',
                  f'export const DISCORD_SERVER = "{DISCORD_URL}";',
                  text
              )

              text = re.sub(
                  r'export const CODEBERG = ".*?";',
                  'export const CODEBERG = "";',
                  text
              )

              text = re.sub(
                  r'export const GITHUB = ".*?";',
                  f'export const GITHUB = "{GITHUB_URL}";',
                  text
              )

              constants.write_text(text, encoding="utf-8")

          strings = Path("src/core/i18n/default.json")
          if strings.exists():
              text = strings.read_text(encoding="utf-8", errors="ignore")

              text = text.replace('"PUPU": "Kettu"', '"PUPU": "CloudCord"')
              text = text.replace('"PUPU_URL": "Kettu URL"', '"PUPU_URL": "CloudCord URL"')
              text = text.replace('"CODEBERG": "Codeberg"', '"CODEBERG": ""')
              text = text.replace('"URL_PLACEHOLDER": "https://codeberg.org/cocobo1/Kettu"', f'"URL_PLACEHOLDER": "{GITHUB_URL}"')
              text = text.replace('"URL_PLACEHOLDER": "https://github.com/BypassHub-EX/cloudcord"', f'"URL_PLACEHOLDER": "{GITHUB_URL}"')

              strings.write_text(text, encoding="utf-8")

          general = Path("src/core/ui/settings/pages/General/index.tsx")
          if general.exists():
              text = general.read_text(encoding="utf-8", errors="ignore")

              text = text.replace(
                  'import { DISCORD_SERVER, GITHUB, CODEBERG } from "@lib/utils/constants";',
                  'import { DISCORD_SERVER, GITHUB } from "@lib/utils/constants";'
              )

              text = text.replace(
                  'import { GITHUB, CODEBERG } from "@lib/utils/constants";',
                  'import { DISCORD_SERVER, GITHUB } from "@lib/utils/constants";'
              )

              text = text.replace(
                  'import { GITHUB } from "@lib/utils/constants";',
                  'import { DISCORD_SERVER, GITHUB } from "@lib/utils/constants";'
              )

              text = text.replace(
                  'import CodebergIcon from "@assets/icons/codeberg-logo_icon_white.png";\n',
                  ''
              )

              text = re.sub(
                  r'\n\s*<TableRow\s+arrow=\{true\}\s+label=\{Strings\.CODEBERG\}[\s\S]*?onPress=\{\(\) => Linking\.openURL\(CODEBERG\)\}\s*/>',
                  '',
                  text
              )

              if "Linking.openURL(DISCORD_SERVER)" not in text:
                  text = text.replace(
                      '<TableRowGroup title={Strings.LINKS}>',
                      '''<TableRowGroup title={Strings.LINKS}>
                    <TableRow
                        arrow={true}
                        label={Strings.DISCORD_SERVER}
                        icon={<TableRow.Icon source={findAssetId("Discord")!} />}
                        onPress={() => Linking.openURL(DISCORD_SERVER)}
                    />'''
                  )

              general.write_text(text, encoding="utf-8")

          settings_index = Path("src/core/ui/settings/index.ts")
          if settings_index.exists():
              text = settings_index.read_text(encoding="utf-8", errors="ignore")

              text = text.replace(
                  'icon: { uri: PupuIcon },',
                  f'icon: {{ uri: "{CLOUDCORD_ICON}" }},'
              )

              text = re.sub(
                  r'\n\s*\{\s*key:\s*"CLOUD_SYNC"[\s\S]*?(?:render:\s*\(\) => import\("[^"]+"\)|onPress:\s*\(\) => [^\n]+)[\s\S]*?\n\s*\},',
                  '',
                  text
              )

              cloud_sync_item = f'''            {{
                  key: "CLOUD_SYNC",
                  title: () => "Cloud Sync",
                  icon: {{ uri: "{CLOUDSYNC_ICON}" }},
                  render: () => import("@core/ui/settings/pages/CloudSync")
              }},'''

              plugin_row_pattern = r'(\n\s*\{\s*key:\s*"BUNNY_PLUGINS",)'

              if 'key: "CLOUD_SYNC"' not in text:
                  text = re.sub(
                      plugin_row_pattern,
                      lambda match: "\n" + cloud_sync_item + match.group(1),
                      text,
                      count=1
                  )

              settings_index.write_text(text, encoding="utf-8")

          build = Path("scripts/build.mjs")
          if build.exists():
              text = build.read_text(encoding="utf-8", errors="ignore")
              text = text.replace('version: `"v1.4.2"`', 'version: `"v0.1"`')
              text = text.replace('version: `"v1.4.1"`', 'version: `"v0.1"`')
              text = text.replace('version: `"v1.4.0"`', 'version: `"v0.1"`')
              build.write_text(text, encoding="utf-8")
          PY

      - name: Install dependencies
        run: |
          set -e
          cd _kettu_build
          bun install

      - name: Build CloudCord runtime
        run: |
          set -e
          cd _kettu_build
          bun run build -- --build-minify

          cp dist/kettu.js ../cloudcord.js
          cp dist/kettu.min.js ../cc.js
          cp dist/kettu.min.js ../cloudcord.min.js

      - name: Commit runtime files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cc.js cloudcord.js cloudcord.min.js
          git commit -m "Build CloudCord v0.1 runtime with Cloud Sync" || exit 0
          git push

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudcord-runtime
          path: |
            cc.js
            cloudcord.js
            cloudcord.min.js
