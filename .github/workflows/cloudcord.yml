name: Build CloudCord Runtime

"on":
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Clone clean Kettu source
        run: |
          set -e
          rm -rf _kettu_build
          git clone --depth=1 https://codeberg.org/cocobo1/Kettu.git _kettu_build

      - name: Apply CloudCord patches
        run: |
          set -e
          cd _kettu_build

          if [ -f "../cloudcord-favicon.png" ]; then
            cp "../cloudcord-favicon.png" "src/assets/icons/kettu.png"
          elif [ -f "../assets/cloudcord-favicon.png" ]; then
            cp "../assets/cloudcord-favicon.png" "src/assets/icons/kettu.png"
          elif [ -f "../assets/cloudcord-logo.png" ]; then
            cp "../assets/cloudcord-logo.png" "src/assets/icons/kettu.png"
          fi

          mkdir -p src/core/ui/settings/pages/CloudSync
          mkdir -p src/core/ui/settings/components

          cat > src/core/ui/settings/components/ScaledPluginSettings.tsx <<'TSX'
          import type { ComponentType } from "react";
          import { ScrollView, View } from "react-native";

          export default function ScaledPluginSettings({ component: Component }: { component: ComponentType<any> }) {
              return (
                  <ScrollView
                      style={{ flex: 1 }}
                      contentContainerStyle={{
                          paddingBottom: 90,
                          paddingHorizontal: 12
                      }}
                      showsVerticalScrollIndicator={true}
                  >
                      <View
                          style={{
                              width: "100%",
                              paddingRight: 24,
                              overflow: "visible"
                          }}
                      >
                          <Component />
                      </View>
                  </ScrollView>
              );
          }
          TSX

          cat > src/core/ui/settings/pages/CloudSync/index.tsx <<'TSX'
          import { VdPluginManager } from "@core/vendetta/plugins";
          import { useProxy } from "@core/vendetta/storage";
          import ScaledPluginSettings from "@core/ui/settings/components/ScaledPluginSettings";
          import { findAssetId } from "@lib/api/assets";
          import { showToast } from "@lib/ui/toasts";
          import { Card, Stack, TableRow, TableRowGroup, Text } from "@metro/common/components";
          import { useState } from "react";
          import { ScrollView, View } from "react-native";

          const PLUGIN_URL = "https://revenge.nexpid.xyz/cloud-sync/";
          const CLOUDSYNC_ICON = "https://images.weserv.nl/?url=raw.githubusercontent.com/nexpid/CloudSync/main/assets/icon-bright.svg&w=128&h=128&output=png";

          export default function CloudSync() {
              useProxy(VdPluginManager.plugins);

              const [busy, setBusy] = useState(false);
              const [refresh, setRefresh] = useState(0);

              const plugin = VdPluginManager.plugins[PLUGIN_URL];
              const SettingsComponent = plugin?.enabled ? VdPluginManager.getSettings(PLUGIN_URL) : null;

              async function installOrStart() {
                  if (busy) return;

                  setBusy(true);

                  try {
                      if (!VdPluginManager.plugins[PLUGIN_URL]) {
                          await VdPluginManager.installPlugin(PLUGIN_URL, true);
                          showToast("Cloud Sync installed", findAssetId("Check"));
                      } else if (!VdPluginManager.plugins[PLUGIN_URL].enabled) {
                          await VdPluginManager.startPlugin(PLUGIN_URL);
                          showToast("Cloud Sync started", findAssetId("Check"));
                      } else {
                          showToast("Cloud Sync is already enabled", findAssetId("Check"));
                      }

                      setRefresh(x => x + 1);
                  } catch (error: any) {
                      console.error("[CloudCord] Cloud Sync install/start failed", error);
                      showToast(error?.message ?? "Cloud Sync failed");
                  } finally {
                      setBusy(false);
                  }
              }

              async function refetchPlugin() {
                  if (busy) return;

                  setBusy(true);

                  try {
                      if (VdPluginManager.plugins[PLUGIN_URL]?.enabled) {
                          VdPluginManager.stopPlugin(PLUGIN_URL, false);
                      }

                      await VdPluginManager.fetchPlugin(PLUGIN_URL);
                      await VdPluginManager.startPlugin(PLUGIN_URL);

                      showToast("Cloud Sync refreshed", findAssetId("Check"));
                      setRefresh(x => x + 1);
                  } catch (error: any) {
                      console.error("[CloudCord] Cloud Sync refresh failed", error);
                      showToast(error?.message ?? "Cloud Sync refresh failed");
                  } finally {
                      setBusy(false);
                  }
              }

              async function removePlugin() {
                  if (busy) return;

                  setBusy(true);

                  try {
                      if (VdPluginManager.plugins[PLUGIN_URL]) {
                          await VdPluginManager.removePlugin(PLUGIN_URL);
                      }

                      showToast("Cloud Sync removed");
                      setRefresh(x => x + 1);
                  } catch (error: any) {
                      console.error("[CloudCord] Cloud Sync remove failed", error);
                      showToast(error?.message ?? "Cloud Sync remove failed");
                  } finally {
                      setBusy(false);
                  }
              }

              if (SettingsComponent) {
                  return <ScaledPluginSettings key={`cloud-sync-settings-${refresh}`} component={SettingsComponent} />;
              }

              return (
                  <ScrollView style={{ flex: 1 }} contentContainerStyle={{ paddingBottom: 38 }}>
                      <Stack style={{ paddingVertical: 24, paddingHorizontal: 12 }} spacing={24}>
                          <TableRowGroup title="Cloud Sync">
                              <View style={{ paddingHorizontal: 12, paddingBottom: 12 }}>
                                  <Text variant="heading-md/semibold" color="text-normal">
                                      Cloud Sync
                                  </Text>
                                  <Text variant="text-sm/medium" color="text-muted">
                                      Install the official Cloud Sync plugin to connect, sync, add backup files, and save backups to your device.
                                  </Text>
                              </View>

                              <TableRow
                                  arrow
                                  label={plugin ? "Start Cloud Sync" : "Install Cloud Sync"}
                                  subLabel={busy ? "Please wait..." : "Loads the official Cloud Sync plugin UI"}
                                  icon={<TableRow.Icon source={{ uri: CLOUDSYNC_ICON }} />}
                                  onPress={installOrStart}
                              />

                              {plugin && (
                                  <TableRow
                                      arrow
                                      label="Refresh Cloud Sync"
                                      subLabel="Refetches the official plugin"
                                      icon={<TableRow.Icon source={findAssetId("RetryIcon")!} />}
                                      onPress={refetchPlugin}
                                  />
                              )}

                              {plugin && (
                                  <TableRow
                                      arrow
                                      label="Remove Cloud Sync"
                                      subLabel="Uninstalls the Cloud Sync plugin"
                                      icon={<TableRow.Icon source={findAssetId("TrashIcon") ?? findAssetId("CircleXIcon-primary")!} />}
                                      onPress={removePlugin}
                                  />
                              )}
                          </TableRowGroup>

                          <Card border="strong">
                              <View style={{ padding: 12 }}>
                                  <Text variant="text-sm/medium" color="text-muted">
                                      This tab uses the official Cloud Sync plugin. The plugin itself handles OAuth, sync, backups, and files.
                                  </Text>
                              </View>
                          </Card>
                      </Stack>
                  </ScrollView>
              );
          }
          TSX

          cat > src/lib/addons/themes/colors/patches/background.tsx <<'TSX'
          import { colorsPref } from "@lib/addons/themes/colors/preferences";
          import { _colorRef } from "@lib/addons/themes/colors/updater";
          import { after } from "@lib/api/patcher";
          import { useObservable } from "@lib/api/storage";
          import { findInReactTree } from "@lib/utils";
          import { logger } from "@lib/utils/logger";
          import { findByFilePathLazy } from "@metro";
          import chroma from "chroma-js";
          import { ImageBackground, StyleSheet, View } from "react-native";

          const Messages = findByFilePathLazy("modules/messages/native/Messages.tsx", true);

          function getBackground() {
              const bg = _colorRef.current?.background;
              if (!bg || colorsPref.customBackground === "hidden") return null;

              const url = bg.url;
              if (!url || typeof url !== "string") return null;

              const blur = typeof bg.blur === "number" ? bg.blur : Number(bg.blur) || 0;
              const opacity = typeof bg.opacity === "number" ? bg.opacity : Number(bg.opacity) || 1;

              return { url, blur, opacity };
          }

          function ThemeBackground({ children }: { children: React.ReactNode; }) {
              useObservable([colorsPref]);

              const bg = getBackground();
              if (!bg) return children;

              return (
                  <ImageBackground
                      key={bg.url}
                      style={{ flex: 1, width: "100%", height: "100%" }}
                      source={{ uri: bg.url }}
                      blurRadius={bg.blur}
                      resizeMode="cover"
                  >
                      <View style={{ flex: 1, backgroundColor: "transparent" }}>
                          {children}
                      </View>
                  </ImageBackground>
              );
          }

          export default function patchChatBackground() {
              try {
                  const patches = [
                      after("render", Messages, (_, ret) => {
                          const bg = getBackground();
                          if (!bg) return;

                          const messagesComponent = findInReactTree(
                              ret,
                              x => x?.props?.style && (
                                  "HACK_fixModalInteraction" in x.props
                                  || Array.isArray(x.props.children)
                                  || x.props.children
                              )
                          );

                          if (messagesComponent) {
                              const flattened = StyleSheet.flatten(messagesComponent.props.style ?? {});
                              const baseColor = flattened.backgroundColor || "black";

                              let backgroundColor = "transparent";

                              try {
                                  backgroundColor = chroma(baseColor)
                                      .alpha(1 - bg.opacity)
                                      .hex();
                              } catch {
                                  backgroundColor = "transparent";
                              }

                              messagesComponent.props.style = StyleSheet.flatten([
                                  messagesComponent.props.style,
                                  { backgroundColor }
                              ]);
                          }

                          return <ThemeBackground>{ret}</ThemeBackground>;
                      })
                  ];

                  return () => patches.forEach(x => x());
              } catch (e) {
                  logger.error("Failed to patch chat background.", e);
                  return () => {};
              }
          }
          TSX

          python3 - <<'PY'
          from pathlib import Path
          import re

          DISCORD_URL = "https://discord.gg/5naTPJYemX"
          GITHUB_URL = "https://github.com/xohus/cloudcord"
          CLOUDCORD_ICON = "https://raw.githubusercontent.com/xohus/cloudcord/main/cloudcord-favicon.png"
          CLOUDSYNC_ICON = "https://images.weserv.nl/?url=raw.githubusercontent.com/nexpid/CloudSync/main/assets/icon-bright.svg&w=128&h=128&output=png"

          replacements = {
              "KettuTweak": "CloudCord",
              "Kettu Enhancements": "CloudCord Enhancements",
              "Kettu": "CloudCord",
              "https://github.com/C0C0B01/CloudCord": GITHUB_URL,
              "https://github.com/C0C0B01/Kettu": GITHUB_URL,
              "https://github.com/BypassHub-EX/cloudcord": GITHUB_URL,
              "https://codeberg.org/cocobo1/CloudCord": GITHUB_URL,
              "https://codeberg.org/cocobo1/Kettu": GITHUB_URL,
              "Load Kettu without loading add-ons": "Load CloudCord without loading add-ons",
              "Failed to load Kettu!": "Failed to load CloudCord!"
          }

          exts = {".ts", ".tsx", ".js", ".jsx", ".json", ".mjs", ".md"}

          for path in Path(".").rglob("*"):
              if not path.is_file() or path.suffix not in exts:
                  continue

              text = path.read_text(encoding="utf-8", errors="ignore")
              original = text

              for old, new in replacements.items():
                  text = text.replace(old, new)

              if text != original:
                  path.write_text(text, encoding="utf-8")

          constants = Path("src/lib/utils/constants.ts")
          if constants.exists():
              text = constants.read_text(encoding="utf-8", errors="ignore")

              text = re.sub(
                  r'export const DISCORD_SERVER = ".*?";',
                  f'export const DISCORD_SERVER = "{DISCORD_URL}";',
                  text
              )

              text = re.sub(
                  r'export const CODEBERG = ".*?";',
                  'export const CODEBERG = "";',
                  text
              )

              text = re.sub(
                  r'export const GITHUB = ".*?";',
                  f'export const GITHUB = "{GITHUB_URL}";',
                  text
              )

              constants.write_text(text, encoding="utf-8")

          strings = Path("src/core/i18n/default.json")
          if strings.exists():
              text = strings.read_text(encoding="utf-8", errors="ignore")

              text = text.replace('"PUPU": "CloudCord"', '"PUPU": "CloudCord"')
              text = text.replace('"PUPU_URL": "CloudCord URL"', '"PUPU_URL": "CloudCord URL"')
              text = text.replace('"CODEBERG": "Codeberg"', '"CODEBERG": ""')
              text = text.replace('"URL_PLACEHOLDER": "https://codeberg.org/cocobo1/CloudCord"', f'"URL_PLACEHOLDER": "{GITHUB_URL}"')
              text = text.replace('"URL_PLACEHOLDER": "https://github.com/BypassHub-EX/cloudcord"', f'"URL_PLACEHOLDER": "{GITHUB_URL}"')

              strings.write_text(text, encoding="utf-8")

          parser = Path("src/lib/addons/themes/colors/parser.ts")
          if parser.exists():
              text = parser.read_text(encoding="utf-8", errors="ignore")

              if "function normalizeBackgroundDefinition" not in text:
                  text = text.replace(
                      'const tokenRef = findByProps("SemanticColor");',
                      '''const tokenRef = findByProps("SemanticColor");

          function normalizeBackgroundDefinition(bg: any): InternalColorDefinition["background"] | undefined {
              if (!bg) return undefined;

              const url = bg.url || bg.image || bg.source;
              if (!url || typeof url !== "string") return undefined;

              return {
                  url,
                  blur: typeof bg.blur === "number" ? bg.blur : Number(bg.blur) || 0,
                  opacity: typeof bg.opacity === "number" ? bg.opacity : typeof bg.alpha === "number" ? bg.alpha : Number(bg.opacity ?? bg.alpha) || 1
              };
          }

          function getThemeBackground(manifest: any): InternalColorDefinition["background"] | undefined {
              const fromMain = manifest && manifest.main ? manifest.main.background : undefined;
              const fromRoot = manifest ? manifest.background : undefined;
              return normalizeBackgroundDefinition(fromMain || fromRoot);
          }'''
                  )

              text = text.replace(
                  "background: manifest.main.background,",
                  "background: getThemeBackground(manifest),"
              )

              text = re.sub(
                  r'const background: InternalColorDefinition\["background"\] \| undefined = manifest\.background \? \{\n\s*\.\.\.omit\(manifest\.background, \["alpha"\]\),\n\s*opacity: manifest\.background\.alpha\n\s*\} : undefined;',
                  'const background: InternalColorDefinition["background"] | undefined = getThemeBackground(manifest);',
                  text
              )

              text = text.replace(
                  "background: manifest.background",
                  "background: getThemeBackground(manifest)"
              )

              parser.write_text(text, encoding="utf-8")

          general = Path("src/core/ui/settings/pages/General/index.tsx")
          if general.exists():
              text = general.read_text(encoding="utf-8", errors="ignore")

              text = text.replace(
                  'import { DISCORD_SERVER, GITHUB, CODEBERG } from "@lib/utils/constants";',
                  'import { DISCORD_SERVER, GITHUB } from "@lib/utils/constants";'
              )

              text = text.replace(
                  'import { GITHUB, CODEBERG } from "@lib/utils/constants";',
                  'import { DISCORD_SERVER, GITHUB } from "@lib/utils/constants";'
              )

              text = text.replace(
                  'import { GITHUB } from "@lib/utils/constants";',
                  'import { DISCORD_SERVER, GITHUB } from "@lib/utils/constants";'
              )

              text = text.replace(
                  'import CodebergIcon from "@assets/icons/codeberg-logo_icon_white.png";\n',
